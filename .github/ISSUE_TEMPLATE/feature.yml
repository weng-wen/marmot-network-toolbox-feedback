name: Feature request / 功能建议
description: Suggest a focused workflow or offline network tool / 建议明确的工作流或离线网络工具
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve / 要解决的问题
      description: Describe the field task before proposing UI. / 请先描述实际任务，再描述界面。
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Expected workflow / 期望工作流
      placeholder: Inputs, outputs, export format and when it is used. / 输入、输出、导出格式及使用场景。
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network boundary / 联网边界
      options:
        - Fully offline / 完全离线
        - Local network only / 仅局域网
        - Internet on demand / 按需使用公网
        - Unsure / 不确定
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Standards or examples / 标准或参考产品
      description: Link to standards or products without copying proprietary content. / 可附标准或产品链接，请勿复制受版权保护内容。
